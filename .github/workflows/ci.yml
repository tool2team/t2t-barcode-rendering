name: CI - Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x
        
    - name: Display .NET version
      run: dotnet --version

    - name: Show NuGet sources
      run: dotnet nuget list source

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --no-restore --configuration Release

  test-linux:
    name: Test on linux
    runs-on: ubuntu-latest
    needs:
      - build

    strategy:
      matrix:
        dotnet-version: ['8.0.x', '10.0.x']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
        
    - name: Display .NET version
      run: dotnet --version

    - name: Restore SVG dependencies
      run: dotnet restore Tests/T2t.Barcode.Svg.Tests/T2t.Barcode.Svg.Tests.csproj

    - name: Restore Skia dependencies
      run: dotnet restore Tests/T2t.Barcode.Skia.Tests/T2t.Barcode.Skia.Tests.csproj

    - name: Run SVG tests
      run: dotnet test Tests/T2t.Barcode.Svg.Tests/T2t.Barcode.Svg.Tests.csproj --configuration Release --verbosity normal --logger "trx;LogFileName=test-results-svg.trx"
      
    - name: Run Skia tests
      run: dotnet test Tests/T2t.Barcode.Skia.Tests/T2t.Barcode.Skia.Tests.csproj --configuration Release --verbosity normal --logger "trx;LogFileName=test-results-skia.trx"

  test-windows:
    name: Test on windows
    runs-on: windows-latest
    needs:
      - build
          
    strategy:
      matrix:
        dotnet-version: ['8.0.x', '10.0.x']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
        
    - name: Display .NET version
      run: dotnet --version

    - name: Restore SVG dependencies
      run: dotnet restore Tests/T2t.Barcode.Svg.Tests/T2t.Barcode.Svg.Tests.csproj

    - name: Restore Skia dependencies
      run: dotnet restore Tests/T2t.Barcode.Skia.Tests/T2t.Barcode.Skia.Tests.csproj

    - name: Restore Drawing dependencies
      run: dotnet restore Tests/T2t.Barcode.Drawing.Tests/T2t.Barcode.Drawing.Tests.csproj
      
    - name: Run SVG tests
      run: dotnet test Tests/T2t.Barcode.Svg.Tests/T2t.Barcode.Svg.Tests.csproj --configuration Release --verbosity normal --logger "trx;LogFileName=test-results-svg-win.trx" --collect:"XPlat Code Coverage"
      
    - name: Run Skia tests
      run: dotnet test Tests/T2t.Barcode.Skia.Tests/T2t.Barcode.Skia.Tests.csproj --configuration Release --verbosity normal --logger "trx;LogFileName=test-results-skia-win.trx" --collect:"XPlat Code Coverage"

    - name: Run Drawing tests
      run: dotnet test Tests/T2t.Barcode.Drawing.Tests/T2t.Barcode.Drawing.Tests.csproj --configuration Release --verbosity normal --logger "trx;LogFileName=test-results-drawing-win.trx" --collect:"XPlat Code Coverage"

    - name: Upload Windows test results
      if: always() && matrix.dotnet-version == '10.0.x'
      uses: actions/upload-artifact@v4
      with:
        name: test-results-windows-${{ matrix.dotnet-version }}
        path: |
          **/test-results-*.trx
          **/coverage.cobertura.xml

  publish-test-results:
    name: Publish test results
    runs-on: ubuntu-latest
    needs:
      - build
      - test-linux
      - test-windows
    if: always()

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: .

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/test-results-*.trx
          check_name: Test Results


      - name: Upload SVG Windows coverage
        uses: codecov/codecov-action@v5
        with:
          files: test-results-windows-10.0.x/Tests/T2t.Barcode.Svg.Tests/**/coverage.cobertura.xml
          flags: svg
          disable_search: true
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Skia Windows coverage
        uses: codecov/codecov-action@v5
        with:
          files: test-results-windows-10.0.x/Tests/T2t.Barcode.Skia.Tests/**/coverage.cobertura.xml
          flags: skia
          disable_search: true
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Drawing Windows coverage
        uses: codecov/codecov-action@v5
        with:
          files: test-results-windows-10.0.x/Tests/T2t.Barcode.Drawing.Tests/**/coverage.cobertura.xml
          flags: drawing
          disable_search: true
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}