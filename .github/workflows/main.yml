name: Deploy NuGet Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-and-pack:
    name: Build, Pack and Publish
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Build T2t.Barcode.Core
        run: |
          dotnet restore T2t.Barcode.Core/T2t.Barcode.Core.csproj --source "https://api.nuget.org/v3/index.json"
          dotnet build T2t.Barcode.Core/T2t.Barcode.Core.csproj --configuration Release --no-restore -p:Version="${{ github.ref_name }}"

      - name: Build T2t.Barcode.Drawing
        run: |
          dotnet restore T2t.Barcode.Drawing/T2t.Barcode.Drawing.csproj --source "https://api.nuget.org/v3/index.json"
          dotnet build T2t.Barcode.Drawing/T2t.Barcode.Drawing.csproj --configuration Release --no-restore -p:Version="${{ github.ref_name }}"

      - name: Build T2t.Barcode.Skia
        run: |
          dotnet restore T2t.Barcode.Skia/T2t.Barcode.Skia.csproj --source "https://api.nuget.org/v3/index.json" 
          dotnet build T2t.Barcode.Skia/T2t.Barcode.Skia.csproj --configuration Release --no-restore -p:Version="${{ github.ref_name }}"

      - name: Build T2t.Barcode.Svg
        run: |
          dotnet restore T2t.Barcode.Svg/T2t.Barcode.Svg.csproj --source "https://api.nuget.org/v3/index.json"
          dotnet build T2t.Barcode.Svg/T2t.Barcode.Svg.csproj --configuration Release --no-restore -p:Version="${{ github.ref_name }}"

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v(.*)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            VERSION="1.0.0-dev.$(date +%s)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Pack T2t.Barcode.Core
        run: |
          dotnet pack T2t.Barcode.Core/T2t.Barcode.Core.csproj \
              -c Release \
              -o ./nupkgs \
              --no-build \
              -p:PackageVersion=${{ steps.version.outputs.version }} \
              -v minimal

      - name: Pack T2t.Barcode.Drawing
        run: |
          dotnet pack T2t.Barcode.Drawing/T2t.Barcode.Drawing.csproj
              -c Release \
              -o ./nupkgs \
              --no-build \
              -p:PackageVersion=${{ steps.version.outputs.version }} \
              -v minimal

      - name: Pack T2t.Barcode.Skia
        run: |
          dotnet pack T2t.Barcode.Skia/T2t.Barcode.Skia.csproj \
              -c Release \
              -o ./nupkgs \
              --no-build \
              -p:PackageVersion=${{ steps.version.outputs.version }} \
              -v minimal

      - name: Pack T2t.Barcode.Svg
        run: |
          dotnet pack T2t.Barcode.Svg/T2t.Barcode.Svg.csproj
              -c Release \
              -o ./nupkgs \
              --no-build \
              -p:PackageVersion=${{ steps.version.outputs.version }} \
              -v minimal

      - name: List packages
        run: ls -la ./nupkgs || true

      - name: Check for generated .nupkg files
        run: |
          echo "Looking for .nupkg files in ./nupkgs"
          ls -la ./nupkgs || true
          shopt -s nullglob || true
          files=(./nupkgs/*.nupkg)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .nupkg found in ./nupkgs"
            echo "Contents of ./nupkgs for debugging:"
            ls -la ./nupkgs || true
            exit 1
          fi
          echo "Found nupkg(s):"
          printf "%s\n" "${files[@]}"

      - name: Upload nupkgs for debugging
        uses: actions/upload-artifact@v4
        with:
          name: terminal-gui-xamllike-pack
          path: ./nupkgs

      - name: Diagnostic - GitHub event and ref
        run: |
          echo "GITHUB_EVENT_NAME = $GITHUB_EVENT_NAME"
          echo "GITHUB_REF        = $GITHUB_REF"
          echo "GITHUB_SHA        = $GITHUB_SHA"
          echo "github.ref_name   = ${{ github.ref_name }}"
          echo "GITHUB_REPOSITORY = $GITHUB_REPOSITORY"
          echo "Extracted version = ${{ steps.version.outputs.version }}"

      - name: Publish to NuGet
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          echo "Publishing packages to NuGet.org"
          dotnet nuget push ./nupkgs/*.nupkg -k "$NUGET_API_KEY" -s https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish to GitHub Packages
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || github.event_name == 'workflow_dispatch'
        run: |
          echo "Publishing to GitHub Packages"
          dotnet nuget add source --username tool2team --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/tool2team/index.json"
          dotnet nuget push ./nupkgs/*.nupkg --source github --skip-duplicate
